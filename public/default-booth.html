<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Univers @ Milipol Asia-Pacific | Premium Booth</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f4f4f6;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #111111;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #brand-header {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }
        .logo-orb {
            width: 20px;
            height: 20px;
            background: #1033CF;
            border-radius: 50%;
            box-shadow: 0 0 15px #1033CF;
        }
        #instructions {
            position: absolute;
            bottom: 30px;
            right: 30px;
            font-size: 12px;
            color: #555555;
            text-align: right;
            pointer-events: none;
            z-index: 10;
        }
        #state-indicator {
            position: absolute;
            bottom: 30px;
            left: 30px;
            font-size: 11px;
            letter-spacing: 2px;
            color: #444444;
            text-transform: uppercase;
        }
        .state-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
            margin-right: 8px;
            transition: all 0.5s ease;
        }
        .state-dot.active {
            background: #E5562C;
            box-shadow: 0 0 10px #E5562C;
        }
        .state-dot.active.sync {
            background: #1033CF;
            box-shadow: 0 0 10px #1033CF;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="brand-header">
        <div class="logo-orb" id="ui-logo"></div>
        UNIVERS
    </div>

    <div id="state-indicator">
        <span class="state-dot active" id="dot-0"></span> PROBLEM STATE <br><br>
        <span class="state-dot" id="dot-1"></span> SYSTEM SHIFT <br><br>
        <span class="state-dot" id="dot-2"></span> OUTCOME SYNCHRONIZED
    </div>

    <div id="instructions">
        <b>Click the Black Console to Control Demo</b><br><br>
        Left Click + Drag to Rotate<br>
        Right Click + Drag to Pan<br>
        Scroll to Zoom
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Core Colors & State ---
        const C_PERSIAN_BLUE = 0x1033CF;
        const C_RUST_ORANGE = 0xE5562C;
        const C_MATTE_BLACK = 0x0a0a0a;

        window.currentDemoState = 0;
        window.stateTimer = 0;
        window.userInteracted = false; // Tracks if user took manual control

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf4f4f6); // Premium bright studio gallery background
        scene.fog = new THREE.FogExp2(0xf4f4f6, 0.02);

        // Camera angled for a dramatic, professional architectural hero shot
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(4.5, 2.2, 5.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2; // Increased exposure for better visibility
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1.2, 0);
        controls.maxPolarAngle = Math.PI / 2 - 0.01; // Don't clip below floor

        // --- Lighting Design (Professional Studio Lighting) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); // Brighter base light
        scene.add(ambientLight);

        // Add Hemisphere light for soft, premium global illumination
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x888888, 0.6);
        hemiLight.position.set(0, 10, 0);
        scene.add(hemiLight);

        // Main key light simulating venue truss lighting
        const keyLight = new THREE.SpotLight(0xffffff, 250); // Stronger key light
        keyLight.position.set(4, 8, 6); // Moved up and out for better spread
        keyLight.angle = Math.PI / 3;
        keyLight.penumbra = 0.5; // Softer shadow edges
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.width = 2048;
        keyLight.shadow.mapSize.height = 2048;
        keyLight.shadow.bias = -0.0005;
        scene.add(keyLight);

        // Fill light (Persian Blue tint) to accent shadows
        const fillLight = new THREE.DirectionalLight(C_PERSIAN_BLUE, 2.0);
        fillLight.position.set(-5, 4, 3);
        scene.add(fillLight);

        // Pedestal glow
        const pedestalLight = new THREE.PointLight(C_RUST_ORANGE, 0, 3);
        pedestalLight.position.set(0, 1.5, 0.5);
        scene.add(pedestalLight);

        // --- Premium Materials ---
        const matGlossBlack = new THREE.MeshStandardMaterial({
            color: 0x111111, // Lightened slightly so it's not a black hole
            roughness: 0.15, // Highly reflective
            metalness: 0.8
        });
        const matMatteBlack = new THREE.MeshStandardMaterial({
            color: 0x222222, // Lightened to dark charcoal to clearly show architectural edges
            roughness: 0.8,
            metalness: 0.2
        });
        const matBrandBlue = new THREE.MeshStandardMaterial({
            color: C_PERSIAN_BLUE,
            roughness: 0.3,
            metalness: 0.6
        });
        const matGlowBlue = new THREE.MeshBasicMaterial({ color: C_PERSIAN_BLUE });

        // --- Architecture Group ---
        const boothGroup = new THREE.Group();
        scene.add(boothGroup);

        // 1. Raised Exhibition Deck (4m x 3m)
        const deckGroup = new THREE.Group();
        boothGroup.add(deckGroup);

        const floorGeo = new THREE.BoxGeometry(4, 0.1, 3);
        const floor = new THREE.Mesh(floorGeo, matGlossBlack);
        floor.position.set(0, 0.05, 0); // Sits on the ground
        floor.receiveShadow = true;
        deckGroup.add(floor);

        // Glowing Deck Recess (Underglow)
        const deckGlowGeo = new THREE.BoxGeometry(3.9, 0.05, 2.9);
        const deckGlow = new THREE.Mesh(deckGlowGeo, matGlowBlue);
        deckGlow.position.set(0, 0.025, 0);
        deckGroup.add(deckGlow);

        // Venue Floor (Bright studio floor to contrast the dark booth)
        const venueFloorGeo = new THREE.PlaneGeometry(50, 50);
        const venueFloorMat = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, roughness: 0.8, metalness: 0.1 });
        const venueFloor = new THREE.Mesh(venueFloorGeo, venueFloorMat);
        venueFloor.rotation.x = -Math.PI / 2;
        venueFloor.position.y = 0;
        venueFloor.receiveShadow = true;
        scene.add(venueFloor);

        // 2. The Main "C-Frame" Structure (Wall flowing into Canopy)
        const frameWidth = 4;
        const frameHeight = 3.2;
        const frameDepth = 2.4;
        const thickness = 0.3;

        // Back Wall Part of the C-Frame
        const backWallGeo = new THREE.BoxGeometry(frameWidth, frameHeight, thickness);
        const backWall = new THREE.Mesh(backWallGeo, matMatteBlack);
        backWall.position.set(0, frameHeight/2 + 0.1, -1.5 + thickness/2);
        backWall.receiveShadow = true;
        backWall.castShadow = true;
        boothGroup.add(backWall);

        // Canopy Part of the C-Frame (Flows from the back wall)
        const canopyGeo = new THREE.BoxGeometry(frameWidth, thickness, frameDepth);
        const canopy = new THREE.Mesh(canopyGeo, matMatteBlack);
        canopy.position.set(0, frameHeight - thickness/2 + 0.1, -1.5 + thickness + frameDepth/2 - 0.15);
        canopy.receiveShadow = true;
        canopy.castShadow = true;
        boothGroup.add(canopy);

        // 3. Compact Storage Room (Tucked back left)
        const storageWidth = 1.0;
        const storageGeo = new THREE.BoxGeometry(storageWidth, frameHeight - thickness, 1.2);
        const storage = new THREE.Mesh(storageGeo, matGlossBlack); // Glossy to contrast with matte wall
        storage.position.set(-1.5, (frameHeight - thickness)/2 + 0.1, -0.75);
        storage.receiveShadow = true;
        storage.castShadow = true;
        boothGroup.add(storage);

        // Subtle Door Seam for realism
        const doorSeamGeo = new THREE.BoxGeometry(0.01, 2.0, 0.8);
        const doorSeam = new THREE.Mesh(doorSeamGeo, matMatteBlack);
        doorSeam.position.set(-0.99, 1.1, -0.75);
        boothGroup.add(doorSeam);

        // 4. Acoustic Angled Louvers (Left Side)
        // Reduced to 4 panels so they all terminate safely underneath the overhead canopy
        for (let i = 0; i < 4; i++) {
            const louverGeo = new THREE.BoxGeometry(0.05, frameHeight - thickness, 0.4);
            const louver = new THREE.Mesh(louverGeo, matBrandBlue);
            // Starting after the storage room, keeping them under the ceiling
            louver.position.set(-1.8, (frameHeight - thickness)/2 + 0.1, 0.1 + (i * 0.3));
            louver.rotation.y = Math.PI / 4; // Angled elegantly
            louver.castShadow = true;
            louver.receiveShadow = true;
            boothGroup.add(louver);
        }

        // 4.5. Premium Reception / Greeter Counter
        // Positioned front-left near the louvers to welcome visitors
        const receptionGroup = new THREE.Group();
        // Shifted further right (from -1.35 to -1.0) to prevent intersecting with the blue louvers
        receptionGroup.position.set(-1.0, 0.05, 1.1);
        receptionGroup.rotation.y = Math.PI / 8; // Angled slightly towards the aisle traffic
        boothGroup.add(receptionGroup);

        // Main body of the reception desk
        const recBodyGeo = new THREE.BoxGeometry(0.7, 0.95, 0.4);
        const recBody = new THREE.Mesh(recBodyGeo, matMatteBlack);
        recBody.position.y = 0.475;
        recBody.castShadow = true;
        recBody.receiveShadow = true;
        receptionGroup.add(recBody);

        // Glowing trim under the counter top
        const recTrimGeo = new THREE.BoxGeometry(0.72, 0.02, 0.42);
        const recTrim = new THREE.Mesh(recTrimGeo, matGlowBlue);
        recTrim.position.y = 0.94;
        receptionGroup.add(recTrim);

        // High-gloss premium counter top
        const recTopGeo = new THREE.BoxGeometry(0.75, 0.05, 0.45);
        const recTop = new THREE.Mesh(recTopGeo, matGlossBlack);
        recTop.position.y = 0.975;
        recTop.castShadow = true;
        receptionGroup.add(recTop);

        // 5. Mounted 72" TV (Hero Screen)
        const canvasW = 1920;
        const canvasH = 1080;
        const screenCanvas = document.createElement('canvas');
        screenCanvas.width = canvasW;
        screenCanvas.height = canvasH;
        const ctx = screenCanvas.getContext('2d');
        const screenTexture = new THREE.CanvasTexture(screenCanvas);
        screenTexture.colorSpace = THREE.SRGBColorSpace;

        // 72" TV dimensions in meters (~1.6m x 0.9m)
        const tvWidth = 1.6;
        const tvHeight = 0.9;
        const tvDepth = 0.05;

        // Physical TV Hardware Casing
        const tvGeo = new THREE.BoxGeometry(tvWidth + 0.04, tvHeight + 0.04, tvDepth);
        const tvBody = new THREE.Mesh(tvGeo, matGlossBlack);
        // Wall front surface is at z = -1.2. TV mounts directly on it.
        tvBody.position.set(0.3, 1.5, -1.17);
        tvBody.castShadow = true;
        boothGroup.add(tvBody);

        // The actual screen plane (positioned just in front of the TV body)
        const screenGeo = new THREE.PlaneGeometry(tvWidth, tvHeight);
        const screenMat = new THREE.MeshBasicMaterial({ map: screenTexture });
        const heroScreen = new THREE.Mesh(screenGeo, screenMat);
        heroScreen.position.set(0.3, 1.5, -1.14);
        boothGroup.add(heroScreen);

        // 6. Black LED Touch Panel System (Interactive Control Console)
        const pedestalGroup = new THREE.Group();
        pedestalGroup.position.set(0.3, 0.05, 0.4);
        boothGroup.add(pedestalGroup);

        // Sleek kiosk stand
        const pedBaseGeo = new THREE.BoxGeometry(0.7, 0.9, 0.3);
        const pedBase = new THREE.Mesh(pedBaseGeo, matMatteBlack);
        pedBase.position.y = 0.45;
        pedBase.castShadow = true;
        pedBase.receiveShadow = true;
        pedestalGroup.add(pedBase);

        // Angled Touch Panel Hardware
        const panelBodyGeo = new THREE.BoxGeometry(0.8, 0.05, 0.45);
        const panelBody = new THREE.Mesh(panelBodyGeo, matGlossBlack);
        panelBody.position.set(0, 0.95, 0.05);
        panelBody.rotation.x = Math.PI / 6; // Angled 30 degrees towards user
        panelBody.castShadow = true;
        pedestalGroup.add(panelBody);

        // The Interactive Touch Screen (Canvas Texture)
        const panelCanvas = document.createElement('canvas');
        panelCanvas.width = 1024;
        panelCanvas.height = 512;
        const pctx = panelCanvas.getContext('2d');
        const panelTexture = new THREE.CanvasTexture(panelCanvas);
        panelTexture.colorSpace = THREE.SRGBColorSpace;

        const panelScreenGeo = new THREE.PlaneGeometry(0.76, 0.41);
        const panelScreenMat = new THREE.MeshBasicMaterial({ map: panelTexture });
        const touchScreenMesh = new THREE.Mesh(panelScreenGeo, panelScreenMat);

        // Fix: Parent the screen directly to the angled console so it sits perfectly flush
        touchScreenMesh.rotation.x = -Math.PI / 2; // Lie flat against the top of the console body
        touchScreenMesh.position.set(0, 0.026, 0); // Position exactly on the top surface
        panelBody.add(touchScreenMesh);

        // Function to draw the touch panel UI
        function drawTouchPanel(state) {
            // Draw background
            pctx.fillStyle = '#050505';
            pctx.fillRect(0, 0, 1024, 512);

            pctx.fillStyle = '#1a1a1a';
            pctx.fillRect(0, 0, 1024, 80);
            pctx.fillStyle = '#aaaaaa';
            pctx.font = '600 30px "Segoe UI", sans-serif';
            pctx.textAlign = 'center';
            pctx.fillText('UNIVERS CONTROL TERMINAL', 512, 52);

            // Draw 3 interactive zone buttons
            const btnW = 300;
            const btnH = 360;
            const gap = 34;
            const startX = 28;
            const labels = ["1. PROBLEM", "2. SHIFT", "3. OUTCOME"];

            for(let i=0; i<3; i++) {
                const isActive = (state === i);
                pctx.fillStyle = isActive ? (i === 2 ? '#1033CF' : '#E5562C') : '#111111';
                pctx.fillRect(startX + i*(btnW+gap), 110, btnW, btnH);

                // Button border
                pctx.strokeStyle = isActive ? '#ffffff' : '#333333';
                pctx.lineWidth = 4;
                pctx.strokeRect(startX + i*(btnW+gap), 110, btnW, btnH);

                pctx.fillStyle = isActive ? '#ffffff' : '#666666';
                pctx.font = 'bold 36px "Segoe UI", sans-serif';
                pctx.fillText(labels[i], startX + i*(btnW+gap) + btnW/2, 290);

                if(!isActive) {
                    pctx.font = '24px "Segoe UI", sans-serif';
                    pctx.fillStyle = '#444444';
                    pctx.fillText('TAP TO OVERRIDE', startX + i*(btnW+gap) + btnW/2, 340);
                }
            }
            panelTexture.needsUpdate = true;
        }

        // 7. Premium Ceiling Raft & Orbs
        // Suspended plate that holds the orbs
        const raftGeo = new THREE.BoxGeometry(2.6, 0.05, 1.6);
        const raft = new THREE.Mesh(raftGeo, matGlossBlack);
        raft.position.set(0.3, 2.9, -0.2);
        boothGroup.add(raft);

        // The Orbs
        const orbs = [];
        const orbGeo = new THREE.SphereGeometry(0.06, 32, 32);

        for(let i=0; i<15; i++) {
            const orbMat = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                emissive: 0xffffff,
                emissiveIntensity: 0.5,
                roughness: 0.1
            });
            const orb = new THREE.Mesh(orbGeo, orbMat);

            // Tighter, elegant grid under the raft
            const gridX = -0.6 + (i % 5) * 0.4;
            const gridZ = -0.7 + Math.floor(i / 5) * 0.5;
            const orbY = 2.4 + (Math.sin(gridX * 2) * 0.1) + (Math.cos(gridZ * 3) * 0.1);
            const wireLength = 2.9 - orbY; // Distance to raft

            orb.userData = { phase: Math.random() * Math.PI * 2 };
            orb.position.set(gridX + 0.3, orbY, gridZ);

            const pl = new THREE.PointLight(0xffffff, 0.3, 2.0);
            orb.add(pl);
            orb.userData.light = pl;

            boothGroup.add(orb);
            orbs.push(orb);

            // Sleek suspension wire
            const wireGeo = new THREE.CylinderGeometry(0.002, 0.002, wireLength);
            const wireMat = new THREE.MeshBasicMaterial({color: 0x333333});
            const wire = new THREE.Mesh(wireGeo, wireMat);
            wire.position.y = wireLength / 2;
            orb.add(wire);
        }

        // --- High-End Generative Screen Content ---
        const particles = Array.from({length: 60}, () => ({
            x: Math.random() * canvasW,
            y: Math.random() * canvasH,
            vx: (Math.random() - 0.5) * 2,
            vy: (Math.random() - 0.5) * 2
        }));

        function drawScreen(time) {
            const state = window.currentDemoState;

            // Smooth gradient background
            const grad = ctx.createLinearGradient(0, 0, 0, canvasH);
            if(state === 2) {
                grad.addColorStop(0, '#0a1a6f');
                grad.addColorStop(1, '#050a24');
            } else {
                grad.addColorStop(0, '#111111');
                grad.addColorStop(1, '#050505');
            }
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvasW, canvasH);

            // Architectural Data Grid
            ctx.lineWidth = 1;
            ctx.strokeStyle = state === 2 ? 'rgba(255, 255, 255, 0.1)' : 'rgba(255, 255, 255, 0.05)';
            ctx.beginPath();
            for(let i=0; i<canvasW; i+=80) { ctx.moveTo(i, 0); ctx.lineTo(i, canvasH); }
            for(let i=0; i<canvasH; i+=80) { ctx.moveTo(0, i); ctx.lineTo(canvasW, i); }
            ctx.stroke();

            // Render Nodes
            particles.forEach((p, i) => {
                // Movement logic based on state
                if (state === 0) {
                    p.x += p.vx * 2; p.y += p.vy * 2; // Chaotic
                    if(p.x < 0 || p.x > canvasW) p.vx *= -1;
                    if(p.y < 0 || p.y > canvasH) p.vy *= -1;
                } else if (state === 1) {
                    p.x += p.vx * 0.5; p.y += p.vy * 0.5; // Slowing down
                    if(p.x < 0 || p.x > canvasW) p.vx *= -1;
                    if(p.y < 0 || p.y > canvasH) p.vy *= -1;
                } else {
                    // Snap to elegant architectural grid
                    const cols = 10;
                    const spX = canvasW / cols;
                    const spY = canvasH / 6;
                    const tx = (i % cols) * spX + spX/2;
                    const ty = Math.floor(i / cols) * spY + spY/2;
                    p.x += (tx - p.x) * 0.08;
                    p.y += (ty - p.y) * 0.08;
                }

                ctx.fillStyle = state === 0 ? '#E5562C' : '#ffffff';
                ctx.beginPath();
                ctx.arc(p.x, p.y, state === 2 ? 6 : 4, 0, Math.PI * 2);
                ctx.fill();

                // Draw high-tech connections
                particles.forEach((p2, j) => {
                    if (i === j) return;
                    const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist < 250) {
                        if (state === 0) {
                            ctx.strokeStyle = `rgba(229, 86, 44, ${0.5 * (1 - dist/250)})`;
                        } else if (state === 1) {
                            ctx.strokeStyle = `rgba(255, 255, 255, ${0.3 * (1 - dist/250)})`;
                        } else {
                            ctx.strokeStyle = `rgba(255, 255, 255, ${0.8 * (1 - dist/250)})`;
                        }
                        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    }
                });
            });

            // Cinematic Typography
            ctx.fillStyle = '#ffffff';
            ctx.font = '300 45px "Segoe UI", sans-serif';
            ctx.textAlign = 'left';
            if (state === 0) {
                ctx.fillText("SYSTEM COMPLEXITY: UNRESOLVED CONSTRAINTS", 120, 140);
            } else if (state === 1) {
                ctx.fillText("CALCULATING SYSTEM-LEVEL TRADE-OFFS...", 120, 140);
            } else {
                ctx.font = '600 45px "Segoe UI", sans-serif';
                ctx.fillText("UNIVERS: PORTFOLIO SYNCHRONIZED.", 120, 140);
            }

            // Sleek Progress Bar
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.fillRect(0, canvasH - 6, canvasW, 6);
            ctx.fillStyle = state === 2 ? '#ffffff' : '#E5562C';
            ctx.fillRect(0, canvasH - 6, canvasW * (window.stateTimer / 8), 6);

            screenTexture.needsUpdate = true;
        }

        // --- Animation & State Management ---
        const clock = new THREE.Clock();
        const colorChaos = new THREE.Color(0xE5562C);
        const colorTrans = new THREE.Color(0x888888);
        const colorSync = new THREE.Color(0x1033CF);

        function updateUI(state) {
            document.querySelectorAll('.state-dot').forEach(d => {
                d.classList.remove('active'); d.classList.remove('sync');
            });
            const dot = document.getElementById(`dot-${state}`);
            if(dot) {
                dot.classList.add('active');
                if(state === 2) dot.classList.add('sync');
            }

            const uiLogo = document.getElementById('ui-logo');
            if(state === 0) { uiLogo.style.background = '#E5562C'; uiLogo.style.boxShadow = '0 0 15px #E5562C'; }
            else if(state === 1) { uiLogo.style.background = '#888'; uiLogo.style.boxShadow = 'none'; }
            else { uiLogo.style.background = '#1033CF'; uiLogo.style.boxShadow = '0 0 15px #1033CF'; }

            // Render the touch panel UI
            drawTouchPanel(state);
        }

        // --- Interactive Raycasting Setup ---
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(pointer, camera);

            // Check if user clicked the touch panel screen
            const intersects = raycaster.intersectObject(touchScreenMesh);
            if (intersects.length > 0) {
                const uv = intersects[0].uv;
                let clickedState = 0;

                // UV.x maps from 0 (left) to 1 (right)
                if (uv.x > 0.66) clickedState = 2;
                else if (uv.x > 0.33) clickedState = 1;
                else clickedState = 0;

                window.currentDemoState = clickedState;
                window.stateTimer = 0;
                window.userInteracted = true; // Pauses auto-loop
                updateUI(clickedState);
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Auto-transition (8s loop) ONLY if user hasn't clicked the panel
            if (!window.userInteracted) {
                window.stateTimer += delta;
                if (window.stateTimer >= 8) {
                    window.stateTimer = 0;
                    window.currentDemoState = (window.currentDemoState + 1) % 3;
                    updateUI(window.currentDemoState);
                }
            }
            const state = window.currentDemoState;

            controls.update();

            // Hardware Orbs Logic
            orbs.forEach((orb) => {
                orb.userData.phase += delta;
                let targetColor, targetIntensity;

                if (state === 0) {
                    targetColor = colorChaos;
                    targetIntensity = 0.5 + Math.sin(time * 8 + orb.userData.phase) * 0.5; // Aggressive flicker
                } else if (state === 1) {
                    targetColor = colorTrans;
                    targetIntensity = 0.8; // Processing
                } else {
                    targetColor = colorSync;
                    targetIntensity = 1.0 + Math.sin(time * 2) * 0.3; // Calm breathing
                }

                orb.material.emissive.lerp(targetColor, delta * 4);
                orb.material.emissiveIntensity += (targetIntensity - orb.material.emissiveIntensity) * delta * 6;
                orb.userData.light.color.copy(orb.material.emissive);
                orb.userData.light.intensity = orb.material.emissiveIntensity * 2;
            });

            // Pedestal dramatic lighting
            const pedTargetIntensity = state === 1 ? 5.0 : (state === 0 ? 1.0 : 0.0);
            pedestalLight.color.lerp(state === 0 ? colorChaos : colorTrans, delta * 4);
            pedestalLight.intensity += (pedTargetIntensity - pedestalLight.intensity) * delta * 3;

            drawScreen(time * 1000);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateUI(0);
        animate();
    </script>
</body>
</html>
